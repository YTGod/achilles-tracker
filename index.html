  </section>

  <section id="gaugeSection">
    <h2 class="sec-title">M3 解鎖進度</h2>
    <div class="gauge3" id="gaugeCells"></div>
  </section>

  <section id="chartsSection">
    <h2 class="sec-title">圖表</h2>
    <div class="chart-box"><div class="ctitle2">晨僵趨勢</div><div id="chartStiff"></div></div>
    <div class="chart-box">
      <div class="ctitle2">止點壓痛（左右）</div>

      <div id="chartPain"></div>
    </div>
    <div class="chart-box">
      <div class="ctitle2">訓練負荷 + 次日晨僵</div>

      <div id="chartLoad"></div>
    </div>
    <div class="chart-box"><div class="ctitle2">運動後止點熱感</div><div id="chartHeat"></div></div>
  </section>
</main>

<footer id="saveBar">
  <span id="saveStatus"></span>
  <button id="retryBtn">重試</button>
  <button id="saveBtn" disabled>儲存</button>

function pad2(n){return String(n).padStart(2,'0');}
function toDateStr(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function parseDateStr(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function addDays(dateStr,n){var d=parseDateStr(dateStr);d.setDate(d.getDate()+n);return toDateStr(d);}
function diffDays(a,b){return Math.round((parseDateStr(b)-parseDateStr(a))/86400000);}
function getRealTodayStr(){return toDateStr(new Date());}

function buildPast60Days(todayStr){
  var arr=[];
  for(var i=0;i<60;i++){arr.push(addDays(todayStr,-i));}
  return arr;
}
function findRecord(records,dateStr){
  for(var i=0;i<records.length;i++){ if(records[i].date===dateStr) return records[i]; }
  return null;
}
function latestRecord(records){
  if(!records.length) return null;
  var sorted=records.slice().sort(function(a,b){return a.date<b.date?1:(a.date>b.date?-1:0);});
  return sorted[0];
}
function upsertLocal(records,rec){
  var idx=-1;
  for(var i=0;i<records.length;i++){ if(records[i].date===rec.date){idx=i;break;} }
  var copy=records.slice();
  if(idx>=0) copy[idx]=rec; else copy.push(rec);
  copy.sort(function(a,b){return a.date<b.date?-1:(a.date>b.date?1:0);});
  return copy;
}
function painMax(r){ return Math.max(r.painL||0, r.painR||0); }
function windowRecords(records,endDateStr,windowDays,offsetDays){
  var start=addDays(endDateStr,-(offsetDays+windowDays-1));
  var end=addDays(endDateStr,-offsetDays);
  return records.filter(function(r){ return r.date>=start && r.date<=end; });
}
function avg(arr){ return arr.length? arr.reduce(function(a,b){return a+b;},0)/arr.length : null; }
function computeWindowStats(records,endDateStr,windowDays,offsetDays){
  var recs=windowRecords(records,endDateStr,windowDays,offsetDays);
  return {
    count:recs.length,

    avgPain:avg(recs.map(painMax)),
    loadTotal:recs.reduce(function(s,r){return s+(r.load||0);},0)
  };
}
function pctChange(curr,prev){
  if(prev===null||prev===0||curr===null) return null;
  return (curr-prev)/prev*100;
}
function trendArrowClass(pct){
  if(pct===null) return 'flat';

  if(pct<-5) return 'down';
  return 'flat';
}

  var w30prev=computeWindowStats(records,todayStr,30,30);
  return {

    stiff7pct:pctChange(w7.avgStiff,w7prev.avgStiff),
    pain7pct:pctChange(w7.avgPain,w7prev.avgPain),

  })();
  if(today && yesterday && yesterday.load===3 && today.stiff>yesterday.stiff){
    messages.push({rule:'c',level:'warn',text:'過載確認，今日主動降一級：昨天高強度訓練後晨僵上升，是負荷超過組織當下修復能力的直接訊號。'});
  }
  if(today){
    var w7=windowRecords(records,todayStr,7,0);
    var highLoadDays=w7.filter(function(r){return r.load>=2;}).length;
    if(highLoadDays>=5 && today.mood>=2){
      messages.push({rule:'d',level:'warn',text:'衝動控制提醒：狀態好+連續訓練正是你的復發模式，把好的感覺存起來，用在下一個安全的訓練窗口。'});
    }
  }
  if(today){
    if(today.heat===2){
      messages.push({rule:'e',level:'info',text:'今晚冰敷10-12分：摸起來明顯熱代表急性發炎反應活躍，短時間冰敷能抑制滲出而不影響整體修復。'});
    } else if(today.heat===1){
      messages.push({rule:'e',level:'info',text:'40度泡腳+ankle pump：微溫是正常訓練後反應，泡腳促進循環、ankle pump維持關節液流動。'});
    } else if(today.heat===0 && today.load>=1){
      messages.push({rule:'e',level:'info',text:'泡腳取代冰敷：無熱感代表沒有急性發炎，此時冰敷反而抑制正常修復，改用泡腳。'});
    }
  }
  (function(){
    var stiffStreak=computeStreak(records,todayStr,function(r){return r.stiff===0;});
    var painStreak=computeStreak(records,todayStr,function(r){return painMax(r)<2;});
    if(stiffStreak>=5 && painStreak>=3){
      messages.push({rule:'f',level:'good',text:'接近M3解鎖，可預約超音波：晨僵連續歸零與壓痛穩定達標，代表神經敏感化與局部發炎都在可控範圍，是取得影像基準的好時機。'});
    }
  })();
  (function(){
    var cmp=computeComparison(records,todayStr);
    if(cmp.pain7pct!==null && cmp.pain7pct<=-30){
      messages.push({rule:'g',level:'good',text:'近7天平均壓痛較前7天下降超過30%：組織界面修復速度正在超前破壞速度，維持目前的負荷策略。'});
    }
  })();
  return messages;
}
function computeGauge(records,todayStr){
  return {
    stiffZeroStreak:computeStreak(records,todayStr,function(r){return r.stiff===0;}),
    stiffZeroTarget:5,
    painLowStreak:computeStreak(records,todayStr,function(r){return painMax(r)<2;}),
    painLowTarget:3,
    ultrasound:'?'
  };
}
function buildXScale(records,width,padL,padR){
  if(!records.length) return {minStr:null,maxStr:null,x:function(){return padL;}};
  var dates=records.map(function(r){return r.date;}).slice().sort();
  var minD=parseDateStr(dates[0]), maxD=parseDateStr(dates[dates.length-1]);
  var span=Math.max(1,(maxD-minD)/86400000);
  var innerW=width-padL-padR;
  return {
    minStr:dates[0], maxStr:dates[dates.length-1],
    x:function(dateStr){ var d=parseDateStr(dateStr); return padL + ((d-minD)/86400000)/span*innerW; }
  };
}
function buildLineSegments(records,key){
  var sorted=records.filter(function(r){return r[key]!==undefined && r[key]!==null;})
    .slice().sort(function(a,b){return a.date<b.date?-1:(a.date>b.date?1:0);});
  var segments=[], current=[];
  for(var i=0;i<sorted.length;i++){
    if(i>0 && diffDays(sorted[i-1].date,sorted[i].date)>1){
      if(current.length) segments.push(current);
      current=[];
    }
    current.push(sorted[i]);
  }
  if(current.length) segments.push(current);
  return segments;
}
/* ============================================================
 * PURE-END
 
 * ============================================================ */
</script>
<script>
/* ============================================================
 * SVG 圖表建構（字串產生，不依賴外部函式庫）
 * ============================================================ */
var CHART_W = 340, CHART_H = 170;
var PAD_L = 34, PAD_R = 10, PAD_T = 14, PAD_B = 22;

function svgEsc(s){ return String(s); }

function axisSkeleton(yMax, yLabel, xScale, yTicks){
  var innerW = CHART_W-PAD_L-PAD_R, innerH = CHART_H-PAD_T-PAD_B;
  var parts = [];
  // gridlines + y labels
  yTicks.forEach(function(t){
    var y = PAD_T + innerH - (t/yMax)*innerH;
    parts.push('<line x1="'+PAD_L+'" y1="'+y+'" x2="'+(CHART_W-PAD_R)+'" y2="'+y+'" stroke="#262d3a" stroke-width="1"/>');
    parts.push('<text x="'+(PAD_L-6)+'" y="'+(y+3)+'" font-size="9" fill="#8b93a3" text-anchor="end">'+t+'</text>');
  });
  // y axis unit label (rotated)
  parts.push('<text x="10" y="'+(PAD_T+8)+'" font-size="9" fill="#c8f04a" text-anchor="start">'+svgEsc(yLabel)+'</text>');
  // x axis line
  parts.push('<line x1="'+PAD_L+'" y1="'+(CHART_H-PAD_B)+'" x2="'+(CHART_W-PAD_R)+'" y2="'+(CHART_H-PAD_B)+'" stroke="#262d3a" stroke-width="1"/>');
  // x labels: min and max date, plus a mid tick
  if(xScale.minStr){
    parts.push('<text x="'+PAD_L+'" y="'+(CHART_H-6)+'" font-size="9" fill="#8b93a3" text-anchor="start">'+xScale.minStr.slice(5)+'</text>');
    parts.push('<text x="'+(CHART_W-PAD_R)+'" y="'+(CHART_H-6)+'" font-size="9" fill="#8b93a3" text-anchor="end">'+xScale.maxStr.slice(5)+'</text>');
  }
  return parts.join('');
}

function polylineFromSegments(records, key, xScale, yMax, color, dotRadius){
  var innerH = CHART_H-PAD_T-PAD_B;
  function yOf(v){ return PAD_T + innerH - (v/yMax)*innerH; }
  var segs = buildLineSegments(records, key);
  var out = [];
  segs.forEach(function(seg){
    var pts = seg.map(function(r){ return xScale.x(r.date).toFixed(1)+','+yOf(r[key]).toFixed(1); }).join(' ');
    if(seg.length>1){
      out.push('<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.2"/>');
    }
    seg.forEach(function(r){
      out.push('<circle cx="'+xScale.x(r.date).toFixed(1)+'" cy="'+yOf(r[key]).toFixed(1)+'" r="'+(dotRadius||2.6)+'" fill="'+color+'"/>');
    });
  });
  return out.join('');
}

function renderStiffChart(records){
  var xScale = buildXScale(records, CHART_W, PAD_L, PAD_R);
  var svg = '<svg viewBox="0 0 '+CHART_W+' '+CHART_H+'" xmlns="http://www.w3.org/2000/svg">';
  svg += axisSkeleton(3, '等級(0-3)', xScale, [0,1,2,3]);
  svg += polylineFromSegments(records, 'stiff', xScale, 3, '#c8f04a', 2.6);
  svg += '</svg>';
  return svg;
}
function renderPainChart(records){
  var xScale = buildXScale(records, CHART_W, PAD_L, PAD_R);
  var svg = '<svg viewBox="0 0 '+CHART_W+' '+CHART_H+'" xmlns="http://www.w3.org/2000/svg">';
  svg += axisSkeleton(3, '壓痛等級(0-3)', xScale, [0,0.5,1,2,3]);
  svg += polylineFromSegments(records, 'painL', xScale, 3, '#4ea1ff', 2.6);
  svg += polylineFromSegments(records, 'painR', xScale, 3, '#3ddc84', 2.2);
  svg += '</svg>';
  return svg;
}
function renderLoadChart(records){
  var xScale = buildXScale(records, CHART_W, PAD_L, PAD_R);
  var innerH = CHART_H-PAD_T-PAD_B, yMax=3;
  function yOf(v){ return PAD_T + innerH - (v/yMax)*innerH; }
  var svg = '<svg viewBox="0 0 '+CHART_W+' '+CHART_H+'" xmlns="http://www.w3.org/2000/svg">';
  svg += axisSkeleton(3, '負荷等級(0-3)', xScale, [0,1,2,3]);
  var sorted = records.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  var barW = 5;
  sorted.forEach(function(r){
    if(r.load===undefined||r.load===null) return;
    var cx = xScale.x(r.date);
    var y = yOf(r.load);
    svg += '<rect x="'+(cx-barW/2).toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+barW+'" height="'+(CHART_H-PAD_B-y).toFixed(1)+'" fill="#c8f04a" opacity="0.55"/>';
  });
  // 次日晨僵折線：對每筆記錄找次日 stiff（若存在且date差1天）
  var nextDayPts = [];
  sorted.forEach(function(r){
    var nxt = findRecord(records, addDays(r.date,1));
    if(nxt && nxt.stiff!==undefined){
      nextDayPts.push({date:r.date, stiff:nxt.stiff});
    }
  });
  svg += polylineFromSegments(nextDayPts, 'stiff', xScale, 3, '#ff5d5d', 2.2);
  svg += '</svg>';
  return svg;
}
function renderHeatChart(records){
  var xScale = buildXScale(records, CHART_W, PAD_L, PAD_R);
  var innerH = CHART_H-PAD_T-PAD_B, yMax=2;
  function yOf(v){ return PAD_T + innerH - (v/yMax)*innerH; }
  var svg = '<svg viewBox="0 0 '+CHART_W+' '+CHART_H+'" xmlns="http://www.w3.org/2000/svg">';
  svg += axisSkeleton(2, '熱感(0-2)', xScale, [0,1,2]);
  records.forEach(function(r){
    if(r.heat===undefined||r.heat===null) return;
    var cx=xScale.x(r.date), cy=yOf(r.heat);
    var color = r.heat===2 ? '#ff5d5d' : '#4ea1ff';
    var rad = r.heat===2 ? 4.2 : 3;
    svg += '<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="'+rad+'" fill="'+color+'"'+(r.heat===2?' stroke="#ffb547" stroke-width="1.2"':'')+'/>';
  });
  svg += '</svg>';
  return svg;
}

/* ============================================================
 * DOM / 應用邏輯
 * ============================================================ */
var FIELD_DEFS = [
  {key:'stiff', label:'晨僵時間', options:[{v:0,l:'0（歸零）'},{v:1,l:'<1分'},{v:2,l:'1-3分'},{v:3,l:'>3分'}]},
  {key:'painL', label:'止點壓痛（左）', options:[{v:0,l:'0（無）'},{v:0.5,l:'>0且≤0.5'},{v:1,l:'0.5-1'},{v:2,l:'1-2'},{v:3,l:'>2'}]},
  {key:'painR', label:'止點壓痛（右）', options:[{v:0,l:'0（無）'},{v:0.5,l:'>0且≤0.5'},{v:1,l:'0.5-1'},{v:2,l:'1-2'},{v:3,l:'>2'}]},
  {key:'walk', label:'走路症狀', options:[{v:0,l:'無'},{v:1,l:'輕微'},{v:2,l:'明顯'}]},
  {key:'load', label:'今日訓練', options:[{v:0,l:'否'},{v:1,l:'輕量'},{v:2,l:'正常'},{v:3,l:'高強度'}]},
  {key:'heat', label:'運動後止點熱感', options:[{v:0,l:'無'},{v:1,l:'微溫'},{v:2,l:'明顯熱'}]},
  {key:'mood', label:'主觀狀態', options:[{v:0,l:'差'},{v:1,l:'普通'},{v:2,l:'好'},{v:3,l:'很好'}]}
];
var REQUIRED_KEYS = ['stiff','painL','painR','walk','load','heat','mood'];

var state = {
  records: [],
  selectedDate: null,
  todayStr: null,
  form: {},
  mockMode: false
};

function qs(name){
  var m = new URLSearchParams(location.search);
  return m.get(name);
}

function initTestMode(){
  var mockParam = qs('mock');
  var dataParam = qs('data');
  var asOfParam = qs('asOf');
  if(mockParam==='1' && !dataParam){
    state.mockMode = true;
    state.records = SEED_33.slice();
  } else if(dataParam && TEST_DATASETS[dataParam]){
    state.mockMode = true;
    state.records = TEST_DATASETS[dataParam].slice();
    if(!asOfParam) asOfParam = TEST_ASOF[dataParam];
  }
  state.todayStr = asOfParam || getRealTodayStr();
  if(state.mockMode){
    var banner = document.getElementById('testBanner');
    banner.style.display='block';
    banner.textContent = '測試模式 data='+(dataParam||'seed33')+' asOf='+state.todayStr+'（不會連線 Apps Script）';
  }
}

function renderFields(){
  var wrap = document.getElementById('fields');
  wrap.innerHTML = '';
  FIELD_DEFS.forEach(function(fd){
    var div = document.createElement('div');
    div.className='field';
    var lab = document.createElement('div');
    lab.className='flabel'; lab.textContent = fd.label;
    div.appendChild(lab);
    var row = document.createElement('div');
    row.className='btn-row';
    fd.options.forEach(function(opt){
      var b = document.createElement('div');
      b.className='btn';
      b.textContent = opt.l;
      b.dataset.key = fd.key;
      b.dataset.val = opt.v;
      if(state.form[fd.key]===opt.v) b.classList.add('selected');
      b.addEventListener('click', function(){
        state.form[fd.key] = opt.v;
        renderFields();
        updateSaveState();
      });
      row.appendChild(b);
    });
    div.appendChild(row);
    wrap.appendChild(div);
  });
}

function updateSaveState(){
  var ok = REQUIRED_KEYS.every(function(k){ return state.form[k]!==undefined && state.form[k]!==null; });
  document.getElementById('saveBtn').disabled = !ok;
}

function populateDateSelect(){
  var sel = document.getElementById('dateSelect');
  sel.innerHTML='';
  var days = buildPast60Days(state.todayStr);
  days.forEach(function(d){
    var opt = document.createElement('option');
    opt.value = d;
    var hasRec = !!findRecord(state.records, d);
    opt.textContent = d + (d===state.todayStr?'（今天）':'') + (hasRec?' ●已記錄':'');
    if(d===state.selectedDate) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.onchange = function(){ loadDate(sel.value); };
}

function loadDate(dateStr){
  state.selectedDate = dateStr;
  document.getElementById('bigDate').textContent = dateStr;
  var existing = findRecord(state.records, dateStr);
  var latest = latestRecord(state.records);
  if(existing){
    state.form = {stiff:existing.stiff, painL:existing.painL, painR:existing.painR,
      walk:existing.walk, load:existing.load, heat:existing.heat, mood:existing.mood};
  } else {
    state.form = {};
    if(latest){
      state.form.stiff = latest.stiff;
      state.form.painL = latest.painL;
      state.form.painR = latest.painR;
    }
  }
  renderFields();
  updateSaveState();
  populateDateSelect();
  renderAnalysis();
  renderGauge();
  renderCharts();
  var status = document.getElementById('saveStatus');
  status.textContent=''; status.className='';
}

function renderAnalysis(){
  var cmp = computeComparison(state.records, state.todayStr);
  var cardsWrap = document.getElementById('cmpCards');
  function fmtPct(p){ return p===null? '--' : (p>0?'+':'')+p.toFixed(0)+'%'; }
  function arrowHtml(p){
    var cls = trendArrowClass(p);
    var sym = cls==='up'?'↑':(cls==='down'?'↓':'→');
    return '<span class="carrow arrow-'+cls+'">'+sym+' '+fmtPct(p)+'</span>';
  }
  cardsWrap.innerHTML =
    '<div class="card"><div class="ctitle">近7天 平均晨僵</div><div class="cval">'+(cmp.w7.avgStiff===null?'--':cmp.w7.avgStiff.toFixed(2))+arrowHtml(cmp.stiff7pct)+'</div></div>'+
    '<div class="card"><div class="ctitle">近7天 平均壓痛(較大側)</div><div class="cval">'+(cmp.w7.avgPain===null?'--':cmp.w7.avgPain.toFixed(2))+arrowHtml(cmp.pain7pct)+'</div></div>'+
    '<div class="card"><div class="ctitle">近7天 訓練負荷總量</div><div class="cval">'+cmp.w7.loadTotal+arrowHtml(cmp.load7pct)+'</div></div>'+
    '<div class="card"><div class="ctitle">近30天 平均晨僵</div><div class="cval">'+(cmp.w30.avgStiff===null?'--':cmp.w30.avgStiff.toFixed(2))+arrowHtml(cmp.stiff30pct)+'</div></div>'+
    '<div class="card"><div class="ctitle">近30天 平均壓痛(較大側)</div><div class="cval">'+(cmp.w30.avgPain===null?'--':cmp.w30.avgPain.toFixed(2))+arrowHtml(cmp.pain30pct)+'</div></div>'+
    '<div class="card"><div class="ctitle">近30天 訓練負荷總量</div><div class="cval">'+cmp.w30.loadTotal+arrowHtml(cmp.load30pct)+'</div></div>';

  var rules = computeRules(state.records, state.todayStr);
  var rw = document.getElementById('ruleMsgs');
  if(!rules.length){
    rw.innerHTML = '<div class="no-rule">今日無特別規則觸發（資料不足或狀態穩定）</div>';
  } else {
    rw.innerHTML = rules.map(function(m){
      return '<div class="rule-msg '+m.level+'"><span class="rtag">規則 '+m.rule+'</span>'+m.text+'</div>';
    }).join('');
  }
}

function renderGauge(){
  var g = computeGauge(state.records, state.todayStr);
  var wrap = document.getElementById('gaugeCells');
  wrap.innerHTML =
    '<div class="gcell"><div class="glabel">晨僵歸零連續天數</div><div class="gval">'+g.stiffZeroStreak+'/'+g.stiffZeroTarget+'</div></div>'+
    '<div class="gcell"><div class="glabel">壓痛(max)&lt;2 連續天數</div><div class="gval">'+g.painLowStreak+'/'+g.painLowTarget+'</div></div>'+
    '<div class="gcell"><div class="glabel">超音波基準</div><div class="gval">'+g.ultrasound+'</div></div>';
}

function renderCharts(){
  document.getElementById('chartStiff').innerHTML = renderStiffChart(state.records);
  document.getElementById('chartPain').innerHTML = renderPainChart(state.records);
  document.getElementById('chartLoad').innerHTML = renderLoadChart(state.records);
  document.getElementById('chartHeat').innerHTML = renderHeatChart(state.records);
}

function fetchAll(){
  if(state.mockMode){
    return Promise.resolve(state.records);
  }
  return fetch(API_URL, {method:'GET'})
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(j){ if(!j.ok) throw new Error(j.error||'unknown error'); return j.records; });
}

function postRecord(rec){
  if(state.mockMode){
    state.records = upsertLocal(state.records, rec);
    return Promise.resolve();
  }
  // 用 text/plain 避免觸發 CORS 預檢請求（Apps Script Web App 對 OPTIONS 支援不佳的已知workaround）
  return fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(rec)
  })
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(j){ if(!j.ok) throw new Error(j.error||'unknown error'); state.records = upsertLocal(state.records, rec); });
}

function doSave(){
  var rec = Object.assign({date: state.selectedDate}, state.form, {ts: new Date().toISOString()});
  var status = document.getElementById('saveStatus');
  var retryBtn = document.getElementById('retryBtn');
  document.getElementById('saveBtn').disabled = true;
  status.textContent = '儲存中…'; status.className='';
  retryBtn.style.display='none';
  postRecord(rec).then(function(){
    status.textContent = '✅ 已儲存'; status.className='ok';
    updateSaveState();
    populateDateSelect();
    renderAnalysis();
    renderGauge();
    renderCharts();
  }).catch(function(err){
    status.textContent = '❌ 儲存失敗：'+err.message; status.className='err';
    retryBtn.style.display='inline-block';
    updateSaveState();
  });
}

function init(){
  initTestMode();
  document.getElementById('saveBtn').addEventListener('click', doSave);
  document.getElementById('retryBtn').addEventListener('click', doSave);
  fetchAll().then(function(records){
    if(!state.mockMode) state.records = records;
    loadDate(state.todayStr);
  }).catch(function(err){
    document.getElementById('bigDate').textContent = state.todayStr || getRealTodayStr();
    var status = document.getElementById('saveStatus');
    status.textContent = '❌ 讀取失敗：'+err.message; status.className='err';
    document.getElementById('retryBtn').style.display='inline-block';
    document.getElementById('retryBtn').onclick = function(){ location.reload(); };
    state.records = [];
    state.selectedDate = state.todayStr || getRealTodayStr();
    document.getElementById('bigDate').textContent = state.selectedDate;
    renderFields(); populateDateSelect(); renderAnalysis(); renderGauge(); renderCharts();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
